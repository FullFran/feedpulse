<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RSS Operations Dashboard</title>
    <link rel="stylesheet" href="/dashboard/styles.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>RSS Operations Dashboard</h1>
        <p>Vista simple para métricas operativas y consulta de noticias por fecha + palabra clave.</p>
      </header>

      <section class="panel auth-panel">
        <label>
          API Key
          <input id="api-key" type="password" placeholder="ak_..." autocomplete="off">
        </label>
        <div class="row">
          <button id="save-key" type="button">Guardar key</button>
          <button id="refresh" type="button">Refrescar</button>
          <a href="/docs" target="_blank" rel="noreferrer">API Docs</a>
        </div>
        <p id="auth-feedback" class="feedback"></p>
      </section>

      <section id="summary" class="kpis"></section>

      <section class="panel">
        <h2>Filtrar noticias</h2>
        <form id="entries-filter" class="filters">
          <label>
            Desde
            <input id="from" name="from" type="datetime-local">
          </label>
          <label>
            Hasta
            <input id="to" name="to" type="datetime-local">
          </label>
          <label>
            Palabras clave
            <input id="search" name="search" type="text" placeholder="okupa sarep ...">
          </label>
          <label>
            Tamaño página
            <input id="page-size" name="page_size" type="number" value="50" min="1" max="200">
          </label>
          <button type="submit">Buscar</button>
        </form>
        <p id="entries-meta" class="feedback"></p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Título</th>
                <th>Feed</th>
                <th>Enlace</th>
              </tr>
            </thead>
            <tbody id="entries-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/dashboard/app.js" defer></script>
  </body>
</html>
