services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rss_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '${POSTGRES_HOST_PORT:-55432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rss_monitor']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_HOST_PORT:-56379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/rss_monitor}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
    command: sh -c "node dist/scripts/migrate.js && node dist/main/api.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_HOST_PORT:-3000}:3000'

  scheduler:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/rss_monitor}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
    command: ["node", "dist/main/scheduler.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/rss_monitor}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
    command: ["node", "dist/main/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${WORKER_METRICS_HOST_PORT:-3001}:3001'

volumes:
  postgres_data:
