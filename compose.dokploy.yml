services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rss_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rss_monitor}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis_data:/data

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/rss_monitor}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: ${PORT:-3000}
    command: sh -c "node dist/scripts/migrate.js && node dist/main/api.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.feedpulse-api.rule=Host(`feedpulse-rss-q2tykg-28f568-49-13-172-238.traefik.me`) || Host(`bah.blakia.es`)
      - traefik.http.routers.feedpulse-api.entrypoints=web,websecure
      - traefik.http.routers.feedpulse-api.tls=true
      - traefik.http.routers.feedpulse-api.tls.certresolver=letsencrypt
      - traefik.http.services.feedpulse-api.loadbalancer.server.port=3000

  scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/rss_monitor}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    command: ['node', 'dist/main/scheduler.js']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/rss_monitor}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    command: ['node', 'dist/main/worker.js']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  dokploy-network:
    external: true
